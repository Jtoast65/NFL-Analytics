version: "3.9"

services:
  api:
    build: .
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - ./models/saved:/app/models/saved

  dashboard:
    image: python:3.11-slim
    working_dir: /app
    command: >
      sh -c "pip install -r requirements.txt -q &&
             streamlit run dashboard/app.py --server.port 8501 --server.address 0.0.0.0"
    ports:
      - "8501:8501"
    env_file:
      - .env
    volumes:
      - .:/app
    depends_on:
      - api
